  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/me.png"
    content: |-
      I am a postgraduate researcher at the Research Center for Satellite Space Technology and Applications (RCSSTEAP) at Beihang University, focusing on satellite navigation systems, UAV route planning, and intelligent transportation systems.

      My research explores how optimization algorithms, navigation technologies, and simulation models can improve autonomous aerial mobility and complex transportation systems. I work on UAV path planning in constrained environments, uncertainty-aware routing strategies, and algorithmic evaluation of grid-based and sampling-based planners.

      I previously completed my degree in Communication Engineering at the Civil Aviation University of China, where I developed strong foundations in wireless communication, satellite systems, and aviation technologies.

      My broader research interest lies in integrating navigation technologies, optimization methods, and multi-agent systems to enable safer and more efficient transportation networks. I am particularly interested in applications related to UAV systems, advanced air mobility, airport operations modeling, and sustainable aviation technologies.

      Outside research, I enjoy working in international and multidisciplinary environments and communicating technical ideas across cultures and languages.

    skills:
      enable: true
      title: "Technologies and research areas I work with:"
      items:
